---

name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  # only one of this action may run per branch
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
          - language: java-kotlin
    env:
      CODEQL_OVERLAY_DATABASE_MODE: none
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          build-mode: none
          languages: ${{ matrix.language }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        if: ${{ matrix.language == 'java-kotlin' }}
        with:
          check-latest: false
          distribution: temurin
          java-version: 25

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        if: ${{ matrix.language == 'java-kotlin' }}
        with:
          maven-version: 3.9.13

      - name: Cache local Maven repository
        if: ${{ matrix.language == 'java-kotlin' }}
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Resolve dependencies and build (no tests)
        if: ${{ matrix.language == 'java-kotlin' }}
        run: |
          mvn dependency:resolve-plugins
          mvn dependency:resolve
          mvn dependency:go-offline
          mvn -o verify -DskipTests -DskipITs

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
